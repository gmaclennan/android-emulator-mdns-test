name: NSD Discovery Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Job 1: Validate the project builds and NSD works on a single emulator
  baseline:
    name: "Baseline - Single Emulator NSD"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APKs
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Run NSD tests on single emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          ram-size: 4096M
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest '-Pandroid.testInstrumentationRunnerArguments.class=com.example.nsdtest.NsdDiscoveryTest#nsdRegistrationWorks,com.example.nsdtest.NsdDiscoveryTest#nsdDiscoveryStarts'

  # Job 2: Two emulators with TAP bridge networking for cross-emulator mDNS
  cross-emulator-tap:
    name: "Cross-Emulator NSD - TAP Bridge"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_AVD_HOME: /home/runner/.config/.android/avd

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add emulator to PATH
        run: |
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install system image
        run: sdkmanager --install "system-images;android-30;default;x86_64"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APKs
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Create AVDs
        run: |
          echo "no" | avdmanager create avd -n avd1 -k "system-images;android-30;default;x86_64" --force
          echo "no" | avdmanager create avd -n avd2 -k "system-images;android-30;default;x86_64" --force
          emulator -list-avds

      - name: Setup TAP bridge
        run: |
          sudo ip tuntap add dev tap0 mode tap user $(whoami)
          sudo ip tuntap add dev tap1 mode tap user $(whoami)
          sudo ip link add bridge0 type bridge
          sudo ip link set tap0 master bridge0
          sudo ip link set tap1 master bridge0
          sudo ip link set bridge0 multicast on
          sudo ip link set tap0 multicast on
          sudo ip link set tap1 multicast on
          sudo ip link set bridge0 up
          sudo ip link set tap0 up
          sudo ip link set tap1 up
          sudo ip addr add 192.168.77.1/24 dev bridge0
          sudo sysctl -w net.ipv4.ip_forward=1

      - name: Start emulators
        run: |
          emulator @avd1 -net-tap tap0 -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot 2>&1 | tee /tmp/emu1.log &
          EMU1_PID=$!
          sleep 5
          if ! kill -0 $EMU1_PID 2>/dev/null; then
            echo "Emulator 1 crashed:"; cat /tmp/emu1.log; exit 1
          fi

          emulator @avd2 -net-tap tap1 -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot 2>&1 | tee /tmp/emu2.log &
          EMU2_PID=$!
          sleep 5
          if ! kill -0 $EMU2_PID 2>/dev/null; then
            echo "Emulator 2 crashed:"; cat /tmp/emu2.log; exit 1
          fi

          echo "EMU1_PID=$EMU1_PID" >> $GITHUB_ENV
          echo "EMU2_PID=$EMU2_PID" >> $GITHUB_ENV

      - name: Wait for boot
        run: |
          for serial in emulator-5554 emulator-5556; do
            echo "Waiting for $serial..."
            timeout 300 adb wait-for-device -s $serial
            while [ "$(adb -s $serial shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" != "1" ]; do sleep 5; done
            echo "$serial booted"
          done
          adb devices

      - name: Configure guest networking
        run: |
          adb -s emulator-5554 root; adb -s emulator-5556 root; sleep 3

          # Find primary interface
          EMU1_IFACE=$(adb -s emulator-5554 shell "ip -o link show | grep -v lo | head -1 | awk '{print \$2}'" | tr -d ':\r\n ')
          EMU2_IFACE=$(adb -s emulator-5556 shell "ip -o link show | grep -v lo | head -1 | awk '{print \$2}'" | tr -d ':\r\n ')
          echo "Interfaces: emu1=$EMU1_IFACE emu2=$EMU2_IFACE"

          # Fix MAC conflict on emu2
          adb -s emulator-5556 shell "ip link set dev $EMU2_IFACE down" || true
          adb -s emulator-5556 shell "ip link set dev $EMU2_IFACE address 52:54:00:12:34:57" || true
          adb -s emulator-5556 shell "ip link set dev $EMU2_IFACE up" || true

          # Assign static IPs
          adb -s emulator-5554 shell "ip addr flush dev $EMU1_IFACE" || true
          adb -s emulator-5554 shell "ip addr add 192.168.77.10/24 dev $EMU1_IFACE" || true
          adb -s emulator-5554 shell "ip route add default via 192.168.77.1" || true

          adb -s emulator-5556 shell "ip addr flush dev $EMU2_IFACE" || true
          adb -s emulator-5556 shell "ip addr add 192.168.77.11/24 dev $EMU2_IFACE" || true
          adb -s emulator-5556 shell "ip route add default via 192.168.77.1" || true

          adb -s emulator-5554 shell "ip rule add from all lookup main pref 99" || true
          adb -s emulator-5556 shell "ip rule add from all lookup main pref 99" || true

      - name: Test connectivity
        run: |
          echo "=== Ping 1->2 ==="
          adb -s emulator-5554 shell "ping -c 3 -W 3 192.168.77.11" || echo "FAILED"
          echo "=== Ping 2->1 ==="
          adb -s emulator-5556 shell "ping -c 3 -W 3 192.168.77.10" || echo "FAILED"

      - name: Run cross-emulator NSD test
        id: run_tests
        run: |
          adb -s emulator-5554 install -t app/build/outputs/apk/debug/app-debug.apk
          adb -s emulator-5556 install -t app/build/outputs/apk/debug/app-debug.apk
          adb -s emulator-5554 install -t app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk

          # Launch service advertiser on emu2
          adb -s emulator-5556 shell am start -n com.example.nsdtest/.MainActivity --es service_name "NsdTest-Emulator2"
          sleep 10

          # Verify activity is running and service registered
          echo "=== Emu2 activity check ==="
          adb -s emulator-5556 shell "dumpsys activity activities | grep -A 2 nsdtest" || true
          echo "=== Emu2 NSD logs ==="
          adb -s emulator-5556 logcat -d -s NsdTest:* | tail -20
          echo "=== Emu2 crash check ==="
          adb -s emulator-5556 logcat -d | grep -iE "(nsdtest|AndroidRuntime|FATAL)" | tail -20 || true

          # Run tests on emu1
          adb -s emulator-5554 shell am instrument -w -e class com.example.nsdtest.NsdDiscoveryTest com.example.nsdtest.test/androidx.test.runner.AndroidJUnitRunner 2>&1 | tee /tmp/test-output.txt

          # Collect all logs
          echo "=== Emu1 NSD logs ==="
          adb -s emulator-5554 logcat -d -s NsdTest:* NsdDiscoveryTest:* | tail -50
          echo "=== Emu1 network ==="
          adb -s emulator-5554 shell ip addr
          echo "=== Emu2 network ==="
          adb -s emulator-5556 shell ip addr

      - name: Post results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testOutput = fs.existsSync('/tmp/test-output.txt') ? fs.readFileSync('/tmp/test-output.txt', 'utf8').slice(-3000) : 'No test output';
            const emu1Log = fs.existsSync('/tmp/emu1.log') ? fs.readFileSync('/tmp/emu1.log', 'utf8').slice(-1000) : 'No emu1 log';
            const emu2Log = fs.existsSync('/tmp/emu2.log') ? fs.readFileSync('/tmp/emu2.log', 'utf8').slice(-1000) : 'No emu2 log';
            const body = `## TAP Bridge Results\n\n### Test Output\n\`\`\`\n${testOutput}\n\`\`\`\n\n### Emulator 1 Log (tail)\n\`\`\`\n${emu1Log}\n\`\`\`\n\n### Emulator 2 Log (tail)\n\`\`\`\n${emu2Log}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.slice(0, 65000)
            });

      - name: Cleanup
        if: always()
        timeout-minutes: 1
        run: |
          timeout 10 adb -s emulator-5554 emu kill 2>/dev/null || true
          timeout 10 adb -s emulator-5556 emu kill 2>/dev/null || true
          kill $EMU1_PID 2>/dev/null || true
          kill $EMU2_PID 2>/dev/null || true
          sudo ip link del bridge0 2>/dev/null || true

  # Job 3: QEMU socket multicast (no root needed)
  cross-emulator-qemu-socket:
    name: "Cross-Emulator NSD - QEMU Socket"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_AVD_HOME: /home/runner/.config/.android/avd

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add emulator to PATH
        run: |
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install system image
        run: sdkmanager --install "system-images;android-30;default;x86_64"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APKs
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Create AVDs
        run: |
          echo "no" | avdmanager create avd -n avd1 -k "system-images;android-30;default;x86_64" --force
          echo "no" | avdmanager create avd -n avd2 -k "system-images;android-30;default;x86_64" --force
          emulator -list-avds

      - name: Start emulators with QEMU socket multicast
        run: |
          emulator @avd1 -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot \
            -qemu -device virtio-net-pci,netdev=sharedlan,mac=52:54:00:12:34:56 -netdev socket,id=sharedlan,mcast=230.0.0.1:1234 \
            2>&1 | tee /tmp/emu1.log &
          EMU1_PID=$!
          sleep 10
          if ! kill -0 $EMU1_PID 2>/dev/null; then
            echo "Emulator 1 crashed:"; cat /tmp/emu1.log; exit 1
          fi

          emulator @avd2 -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot \
            -qemu -device virtio-net-pci,netdev=sharedlan,mac=52:54:00:12:34:57 -netdev socket,id=sharedlan,mcast=230.0.0.1:1234 \
            2>&1 | tee /tmp/emu2.log &
          EMU2_PID=$!
          sleep 10
          if ! kill -0 $EMU2_PID 2>/dev/null; then
            echo "Emulator 2 crashed:"; cat /tmp/emu2.log; exit 1
          fi

          echo "EMU1_PID=$EMU1_PID" >> $GITHUB_ENV
          echo "EMU2_PID=$EMU2_PID" >> $GITHUB_ENV

      - name: Wait for boot
        run: |
          for serial in emulator-5554 emulator-5556; do
            echo "Waiting for $serial..."
            timeout 300 adb wait-for-device -s $serial
            while [ "$(adb -s $serial shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" != "1" ]; do sleep 5; done
            echo "$serial booted"
          done
          adb devices

      - name: Configure shared network interface
        run: |
          adb -s emulator-5554 root; adb -s emulator-5556 root; sleep 2

          echo "=== Network interfaces ==="
          adb -s emulator-5554 shell "ls /sys/class/net/"
          adb -s emulator-5556 shell "ls /sys/class/net/"

          # Find and configure the second NIC
          for IFACE in eth1 ens4 enp0s4; do
            if adb -s emulator-5554 shell "ip link show $IFACE" 2>/dev/null | grep -q "$IFACE"; then
              echo "Found second NIC: $IFACE"
              adb -s emulator-5554 shell "ip link set dev $IFACE up"
              adb -s emulator-5554 shell "ip addr add 192.168.77.10/24 dev $IFACE"
              adb -s emulator-5556 shell "ip link set dev $IFACE up"
              adb -s emulator-5556 shell "ip addr add 192.168.77.11/24 dev $IFACE"
              echo "SHARED_IFACE=$IFACE" >> $GITHUB_ENV
              break
            fi
          done

          adb -s emulator-5554 shell "ip rule add from all lookup main pref 99" || true
          adb -s emulator-5556 shell "ip rule add from all lookup main pref 99" || true

          echo "=== Final state ==="
          adb -s emulator-5554 shell ip addr
          adb -s emulator-5556 shell ip addr

      - name: Test connectivity
        run: |
          echo "=== Ping 1->2 ==="
          adb -s emulator-5554 shell "ping -c 3 -W 3 192.168.77.11" || echo "FAILED"
          echo "=== Ping 2->1 ==="
          adb -s emulator-5556 shell "ping -c 3 -W 3 192.168.77.10" || echo "FAILED"

      - name: Run cross-emulator NSD test
        id: run_tests
        run: |
          adb -s emulator-5554 install -t app/build/outputs/apk/debug/app-debug.apk
          adb -s emulator-5556 install -t app/build/outputs/apk/debug/app-debug.apk
          adb -s emulator-5554 install -t app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk

          # Launch service advertiser on emu2
          adb -s emulator-5556 shell am start -n com.example.nsdtest/.MainActivity --es service_name "NsdTest-Emulator2"
          sleep 10

          # Verify activity is running and service registered
          echo "=== Emu2 activity check ==="
          adb -s emulator-5556 shell "dumpsys activity activities | grep -A 2 nsdtest" || true
          echo "=== Emu2 NSD logs ==="
          adb -s emulator-5556 logcat -d -s NsdTest:* | tail -20
          echo "=== Emu2 crash check ==="
          adb -s emulator-5556 logcat -d | grep -iE "(nsdtest|AndroidRuntime|FATAL)" | tail -20 || true

          # Run tests on emu1
          adb -s emulator-5554 shell am instrument -w -e class com.example.nsdtest.NsdDiscoveryTest com.example.nsdtest.test/androidx.test.runner.AndroidJUnitRunner 2>&1 | tee /tmp/test-output.txt

          # Collect logs
          echo "=== Emu1 NSD logs ==="
          adb -s emulator-5554 logcat -d -s NsdTest:* NsdDiscoveryTest:* | tail -50
          echo "=== Emu1 network ==="
          adb -s emulator-5554 shell ip addr
          echo "=== Emu2 network ==="
          adb -s emulator-5556 shell ip addr

      - name: Post results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testOutput = fs.existsSync('/tmp/test-output.txt') ? fs.readFileSync('/tmp/test-output.txt', 'utf8').slice(-3000) : 'No test output';
            const emu1Log = fs.existsSync('/tmp/emu1.log') ? fs.readFileSync('/tmp/emu1.log', 'utf8').slice(-1000) : 'No emu1 log';
            const emu2Log = fs.existsSync('/tmp/emu2.log') ? fs.readFileSync('/tmp/emu2.log', 'utf8').slice(-1000) : 'No emu2 log';
            const body = `## QEMU Socket Results\n\n### Test Output\n\`\`\`\n${testOutput}\n\`\`\`\n\n### Emulator 1 Log (tail)\n\`\`\`\n${emu1Log}\n\`\`\`\n\n### Emulator 2 Log (tail)\n\`\`\`\n${emu2Log}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.slice(0, 65000)
            });

      - name: Cleanup
        if: always()
        timeout-minutes: 1
        run: |
          timeout 10 adb -s emulator-5554 emu kill 2>/dev/null || true
          timeout 10 adb -s emulator-5556 emu kill 2>/dev/null || true
          kill $EMU1_PID 2>/dev/null || true
          kill $EMU2_PID 2>/dev/null || true
